<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Roboto:400,700&display=swap">
    <style>
        @keyframes glow {
            from { text-shadow: 0 0 10px #fff, 0 0 20px #61dafb; }
            to { text-shadow: 0 0 20px #fff, 0 0 35px #ffcc00; }
        }
        body {
            font-family: 'Roboto', sans-serif;
            text-align: center;
            background: linear-gradient(to right, #90a3e0, #b1cc74);
            color: white;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            height: 100vh;
        }
        .screen {
            display: none;
        }
        .active {
            display: block;
        }
        #board {
            display: grid;
            grid-template-columns: repeat(3, 100px);
            gap: 10px;
            margin: 20px auto;
        }
        .cell {
            width: 100px;
            height: 100px;
            border: 2px solid #61dafb;
            background-color: #4b6cb7;
            font-size: 2em;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background-color 0.3s, transform 0.2s;
        }
        .cell:hover {
            background-color: #182848;
            transform: scale(1.05);
        }
        .winning-cell {
            background-color: #d9534f !important;
        }
        .start-btn {
            background: linear-gradient(to right, #ff9800, #ff5722);
            font-size: 1.3em;
            padding: 15px 35px;
            border-radius: 30px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            transition: transform 0.2s;
        }
        .start-btn:hover {
            transform: scale(1.08);
        }

        button {
            background: linear-gradient(135deg, #00c6ff, #0072ff);
            color: white;
            padding: 14px 28px;
            font-size: 1.1em;
            font-weight: bold;
            border: none;
            cursor: pointer;
            margin: 10px;
            border-radius: 18px;
            box-shadow: 0 6px 15px rgba(0,0,0,0.3);
            transition: all 0.25s ease;
            position: relative;
            overflow: hidden;
        }

        button:hover {
            transform: translateY(-4px) scale(1.05);
        }

        button:active {
            transform: scale(0.95);
        }

        button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: rgba(255,255,255,0.2);
            transition: left 0.4s ease;
        }

        button:hover::before {
            left: 100%;
        }
        .back-btn {
            background: linear-gradient(135deg, #ff2e2e, #b30000);
            display: block;
            margin: 20px auto 0;
            box-shadow: 0 6px 18px rgba(255,0,0,0.4);
        }
        .back-btn:hover {
            transform: scale(1.08);
            box-shadow: 0 8px 22px rgba(255,0,0,0.6);
        }
        .back-btn:hover {
            background-color: #e74c3c;
        }

        button {
            background-color: #61dafb;
            color: white;
            padding: 10px 20px;
            font-size: 1em;
            border: none;
            cursor: pointer;
            margin-top: 20px;
            border-radius: 25px;
        }
        button:hover {
            background-color: #4fa3d1;
        }
    </style>
</head>
<body>
    <div id="startScreen" class="screen active">
        <h1 style="font-size:3.5em; text-shadow: 0 0 15px rgba(255,255,255,0.7); animation: glow 1.5s infinite alternate;">🎮 TIC TAC TOE 🎮</h1>
        <p style="font-size:1.2em; opacity:0.9;">Challenge your friends or defeat the smartest AI 🤖</p>
        <div style="background: rgba(255,255,255,0.15); padding: 30px; border-radius: 30px; backdrop-filter: blur(10px); box-shadow: 0 8px 25px rgba(0,0,0,0.3); display:inline-block;">
            <button class="start-btn" onclick="showModeSelection()">🚀 Start Game</button>
        </div>
    </div>
    
    <div id="modeSelect" class="screen">
        <h1>Select Game Mode</h1>
        <button onclick="startGame('pvp')">👨 vs 👨</button>
        <button onclick="startGame('ai')">👨 vs 🤖</button>
        <button class="back-btn" onclick="goToStart()">Back</button>
    </div>
    
    <div id="gameScreen" class="screen">
        <h2 id="message"></h2>
        <div id="board"></div>
        <button onclick="resetGame()">Restart Game</button>
        <br><button class="back-btn" onclick="goBack()">Back</button>
    </div>
    
    <script>
        let currentPlayer = 'X';
        let gameBoard = ['', '', '', '', '', '', '', '', ''];
        let gameMode = 'pvp';

        function showModeSelection() {
            document.getElementById('startScreen').classList.remove('active');
            document.getElementById('modeSelect').classList.add('active');
        }
        
        function goToStart() {
            document.getElementById('modeSelect').classList.remove('active');
            document.getElementById('startScreen').classList.add('active');
        }

        function startGame(mode) {
            gameMode = mode;
            document.getElementById('modeSelect').classList.remove('active');
            document.getElementById('gameScreen').classList.add('active');
            
            const boardElement = document.getElementById('board');
            boardElement.innerHTML = '';
            for (let i = 0; i < 9; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.dataset.index = i;
                cell.addEventListener('click', handleCellClick);
                boardElement.appendChild(cell);
            }
            resetGame();
        }

        function handleCellClick(event) {
            const index = event.target.dataset.index;
            if (gameBoard[index] === '') {
                makeMove(index);
                if (checkWinner() || isBoardFull()) return;
                if (gameMode === 'ai' && currentPlayer === 'O') setTimeout(unbeatableMove, 500);
            }
        }

        function makeMove(index) {
            gameBoard[index] = currentPlayer;
            document.querySelectorAll('.cell')[index].textContent = currentPlayer;
            currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
        }

        function unbeatableMove() {
            let bestScore = -Infinity;
            let move;

            for (let i = 0; i < gameBoard.length; i++) {
                if (gameBoard[i] === '') {
                    gameBoard[i] = 'O';
                    let score = minimax(gameBoard, 0, false);
                    gameBoard[i] = '';
                    if (score > bestScore) {
                        bestScore = score;
                        move = i;
                    }
                }
            }

            if (move !== undefined) {
                makeMove(move);
                checkWinner();
            }
        }

        function minimax(board, depth, isMaximizing) {
            let result = checkGameResult();
            if (result !== null) {
                const scores = {
                    O: 10,
                    X: -10,
                    tie: 0
                };
                return scores[result];
            }

            if (isMaximizing) {
                let bestScore = -Infinity;
                for (let i = 0; i < board.length; i++) {
                    if (board[i] === '') {
                        board[i] = 'O';
                        let score = minimax(board, depth + 1, false);
                        board[i] = '';
                        bestScore = Math.max(score, bestScore);
                    }
                }
                return bestScore;
            } else {
                let bestScore = Infinity;
                for (let i = 0; i < board.length; i++) {
                    if (board[i] === '') {
                        board[i] = 'X';
                        let score = minimax(board, depth + 1, true);
                        board[i] = '';
                        bestScore = Math.min(score, bestScore);
                    }
                }
                return bestScore;
            }
        }

        function checkGameResult() {
            const winningCombinations = [
                [0, 1, 2], [3, 4, 5], [6, 7, 8],
                [0, 3, 6], [1, 4, 7], [2, 5, 8],
                [0, 4, 8], [2, 4, 6]
            ];

            for (const [a, b, c] of winningCombinations) {
                if (gameBoard[a] && gameBoard[a] === gameBoard[b] && gameBoard[a] === gameBoard[c]) {
                    return gameBoard[a];
                }
            }

            if (!gameBoard.includes('')) return 'tie';
            return null;
        }

        function checkWinner() {
            const winningCombinations = [
                [0, 1, 2], [3, 4, 5], [6, 7, 8],
                [0, 3, 6], [1, 4, 7], [2, 5, 8],
                [0, 4, 8], [2, 4, 6]
            ];
            for (const [a, b, c] of winningCombinations) {
                if (gameBoard[a] && gameBoard[a] === gameBoard[b] && gameBoard[a] === gameBoard[c]) {
                    if (gameMode === 'ai') {
                        document.getElementById('message').textContent = gameBoard[a] === 'O' ? 'AI Wins!' : 'You Win!';
                    } else {
                        document.getElementById('message').textContent = `${gameBoard[a]} Wins!`;
                    }
                    [a, b, c].forEach(i => document.querySelectorAll('.cell')[i].classList.add('winning-cell'));
                    setTimeout(resetGame, 2000);
                    return true;
                }
            }
            if (isBoardFull()) {
                document.getElementById('message').textContent = "It's a tie!";
                setTimeout(resetGame, 2000);
            }
            return false;
        }

        function isBoardFull() {
            return !gameBoard.includes('');
        }

        function resetGame() {
            gameBoard = Array(9).fill('');
            currentPlayer = 'X';
            document.querySelectorAll('.cell').forEach(cell => {
                cell.textContent = '';
                cell.classList.remove('winning-cell');
            });
            document.getElementById('message').textContent = '';
        }

        function goBack() {
            document.getElementById('gameScreen').classList.remove('active');
            document.getElementById('modeSelect').classList.add('active');
        }
    </script>
</body>
</html>
